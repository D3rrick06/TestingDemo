name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install pytest flake8

    - name: Lint
      run: flake8 --max-line-length=110 src/ tests/

    - name: Test
      run: pytest tests/ -v

    - name: Security Check
      run: |
        pip install bandit
        bandit -r src/

    - name: Dependency Check
      run: |
        pip install safety
        safety check --ignore-unpinned-requirements

    - name: Secrets Scan
      run: |
        pip install detect-secrets
        detect-secrets scan src/